user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging with request ID
  log_format main_with_id '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for" '
                          'req_id=$http_x_request_id duration=${request_time}s';

  access_log /var/log/nginx/access.log main_with_id;

  # Performance optimizations
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 10m;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml text/javascript 
             application/json application/javascript application/xml+rss 
             application/rss+xml font/truetype font/opentype 
             application/vnd.ms-fontobject image/svg+xml;
  gzip_disable "msie6";

  # Rate limiting (login attempts)
  limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

  # Upstream backend
  upstream backend {
    least_conn;
    server backend:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  # HTTP to HTTPS redirect (if SSL is configured)
  server {
    listen 80;
    server_name _;
    
    # Allow ACME challenges for Let's Encrypt
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Redirect to HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS server (with optional self-signed cert support)
  server {
    listen 443 ssl http2;
    server_name _;

    # SSL configuration (update paths as needed)
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Deny access to sensitive files
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }

    # Health check endpoint (no auth required)
    location /health {
      access_log off;
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $http_x_request_id;
      
      # Cache health checks briefly
      proxy_cache_valid 200 1s;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    }

    # Login endpoint with stricter rate limiting
    location /auth/login {
      limit_req zone=login_limit burst=2 nodelay;
      
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $http_x_request_id;
      proxy_read_timeout 30s;
      proxy_connect_timeout 10s;
    }

    # API endpoints with standard rate limiting
    location ~ ^/(?!auth/login|health|\.well-known) {
      limit_req zone=api_limit burst=20 nodelay;
      
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $http_x_request_id;
      
      # Preserve cookies for authentication
      proxy_cookie_path / "/";
      proxy_cookie_flags ~ secure httponly samesite=strict;
      
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
      
      # Buffer management
      proxy_buffering on;
      proxy_buffer_size 4k;
      proxy_buffers 8 4k;
      proxy_busy_buffers_size 8k;
    }

    # File uploads (avatar uploads)
    location /files/uploads/avatars {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $http_x_request_id;
      
      # Cache static file uploads for 1 day
      expires 1d;
      add_header Cache-Control "public, max-age=86400, immutable";
      add_header X-Content-Type-Options "nosniff";
    }

    # Deny direct access to sensitive directories
    location ~ ^/(config|admin|internal|backup) {
      deny all;
      access_log off;
      log_not_found off;
    }

    # Default location
    location / {
      limit_req zone=api_limit burst=20 nodelay;
      
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $http_x_request_id;
      
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
    }
  }
}
