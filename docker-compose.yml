version: '3.8'

services:
  # MongoDB database
  mongodb:
    image: mongo:6


    container_name: gmao-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-GMAO_IPROTEX}

    ports:
      - '${MONGODB_PORT:-27017}:27017'
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - gmao-network
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '--eval',
          'db.adminCommand("ping")',
          '--authenticationDatabase',
          'admin',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # Redis cache & session store
  redis:
    image: redis:7-alpine
    container_name: gmao-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --loglevel notice
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - gmao-network
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: gmao-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-3001}
      MONGODB_URI: mongodb://${MONGODB_ROOT_USER:-admin}:${MONGODB_ROOT_PASSWORD:-changeme}@mongodb:27017/${MONGODB_DATABASE:-GMAO_IPROTEX}?authSource=admin

      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002}
      AUDIT_RETENTION_DAYS_INFO: ${AUDIT_RETENTION_DAYS_INFO:-30}
      AUDIT_RETENTION_DAYS_WARNING: ${AUDIT_RETENTION_DAYS_WARNING:-60}
      AUDIT_RETENTION_DAYS_SECURITY: ${AUDIT_RETENTION_DAYS_SECURITY:-180}
      AUDIT_RETENTION_DAYS_CRITICAL: ${AUDIT_RETENTION_DAYS_CRITICAL:-365}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '${BACKEND_PORT:-3001}:3001'
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - gmao-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health/api']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
        labels: 'service=gmao-backend'

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: gmao-nginx
    ports:
      - '${NGINX_PORT:-80}:80'
      - '${NGINX_SSL_PORT:-443}:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend
    networks:
      - gmao-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost/health']
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
        labels: 'service=gmao-nginx'

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  nginx_cache:
    driver: local

networks:
  gmao-network:
    driver: bridge
